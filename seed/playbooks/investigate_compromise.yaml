name: investigate_compromise
version: "1.0"
category: security
description: "침해 흔적 조사: 프로세스/네트워크/파일 이상 탐지 → 포렌식 수집 → 격리"
execution_mode: one_shot
default_risk_level: critical
dry_run_supported: false
explain_supported: true
enabled: true
steps:
  - order: 1
    type: skill
    ref: probe_linux_host
    name: "실행 프로세스 및 연결 상태 수집"
    on_failure: continue
  - order: 2
    type: tool
    ref: fetch_log
    name: "시스템 로그 수집 (auth, syslog)"
    on_failure: continue
  - order: 3
    type: skill
    ref: analyze_wazuh_alert_burst
    name: "보안 이벤트 버스트 분석"
    on_failure: continue
  - order: 4
    type: skill
    ref: summarize_incident_timeline
    name: "침해 타임라인 재구성"
    on_failure: continue
  - order: 5
    type: tool
    ref: run_command
    name: "의심 프로세스 격리"
    on_failure: continue
  - order: 6
    type: tool
    ref: write_file
    name: "포렌식 증거 저장"
    on_failure: abort
