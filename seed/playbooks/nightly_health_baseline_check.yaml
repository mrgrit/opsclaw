name: nightly_health_baseline_check
version: "1.0"
category: operations
description: "야간 자동 건강 상태 점검: 전체 자산 상태 수집 → 이상 탐지 → 리포트 생성"
execution_mode: batch
default_risk_level: low
dry_run_supported: true
explain_supported: true
enabled: true
steps:
  - order: 1
    type: skill
    ref: probe_linux_host
    name: "호스트 기본 상태 수집"
    on_failure: continue
  - order: 2
    type: tool
    ref: query_metric
    name: "메트릭 수집 (CPU/Mem/Disk)"
    on_failure: continue
  - order: 3
    type: skill
    ref: monitor_disk_growth
    name: "디스크 증가율 분석"
    on_failure: continue
  - order: 4
    type: skill
    ref: check_tls_cert
    name: "인증서 만료 점검"
    on_failure: continue
  - order: 5
    type: tool
    ref: write_file
    name: "점검 리포트 저장"
    on_failure: continue
